<div style="
  background: transparent;
  border: 1px solid {% if result.ok %}var(--success){% else %}var(--danger){% endif %};
  color: {% if result.ok %}var(--success){% else %}var(--danger){% endif %};
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  font-size: 0.85rem;
">
  <div style="font-weight:700; margin-bottom:0.3rem;">
    {% if result.ok %}✓{% else %}✕{% endif %} {{ result.message }}
  </div>
  <div style="color:var(--text-muted); font-size:0.78rem; line-height:1.4;">
    {{ result.detail }}
  </div>
  <div style="color:var(--text-muted); font-size:0.72rem; margin-top:0.4rem; font-family:'DM Mono',monospace;">
    {% if result.status_code %}status: {{ result.status_code }} — {% endif %}
    {% if result.elapsed_ms is not None %}{{ result.elapsed_ms }} ms{% endif %}
  </div>
</div>
