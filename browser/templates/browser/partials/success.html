<div style="
  background: var(--surface);
  border: 1px solid var(--success);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  margin-top: 0.5rem;
">
  <div style="color:var(--success); font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; margin-bottom:0.75rem;">
    ✓ Subtítulo guardado
  </div>

  <div style="font-size:0.85rem; margin-bottom:0.5rem;">
    <span style="color:var(--text-muted);">Archivo:</span>
    <span style="color:var(--text);">{{ saved_filename }}</span>
  </div>

  {% if renamed_to_english %}
  <div style="font-size:0.82rem; color:var(--accent); margin-bottom:0.5rem;">
    ↪ Subtítulo anterior renombrado a <strong>{{ renamed_to_english }}</strong>
  </div>
  {% endif %}

  {% if deleted_files %}
  <div style="font-size:0.78rem; color:var(--text-muted); margin-bottom:0.75rem;">
    🗑 Archivos eliminados ({{ deleted_files|length }}):
    {% for f in deleted_files %}
      <span style="display:inline-block; background:var(--surface-2); border:1px solid var(--border);
                   border-radius:3px; padding:0.1rem 0.4rem; margin:0.15rem;">{{ f }}</span>
    {% endfor %}
  </div>
  {% endif %}

  <a href="{% url 'browser:folder_detail' folder_name %}" class="btn-outline" style="font-size:0.8rem;">
    ← Volver
  </a>
</div>
