{% extends "browser/base.html" %}

{% block title %}Biblioteca — SubDivX Browser{% endblock %}

{% block content %}

<div class="d-flex align-items-center justify-content-between mb-3">
  <h1 style="font-family:'Inter',sans-serif; font-size:1.4rem; font-weight:800; margin:0;">
    Biblioteca
  </h1>
</div>

<!-- Carga la lista via HTMX al renderizar la página -->
<div
  hx-get="{% url 'browser:folder_list' %}"
  hx-trigger="load"
  hx-indicator="#loading-folders"
>
  <div id="loading-folders" class="htmx-indicator" style="color:var(--text-muted); padding:1rem 0;">
    <div class="spinner"></div>
    <span>Cargando biblioteca…</span>
  </div>
</div>

{% endblock %}
