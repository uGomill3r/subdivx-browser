{% extends "browser/base.html" %}

{% block title %}Error — SubDivX Browser{% endblock %}

{% block content %}
<div style="text-align:center; padding: 3rem 0;">
  <div style="font-size:2.5rem; margin-bottom:1rem;">⚠️</div>
  <div style="font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:0.75rem;">
    Algo salió mal
  </div>
  <div style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1.5rem;">
    {{ message }}
  </div>
  <a href="{% url 'browser:index' %}" class="btn-outline">← Volver a la biblioteca</a>
</div>
{% endblock %}
